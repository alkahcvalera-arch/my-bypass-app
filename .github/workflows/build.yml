name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython

      - name: Accept Licenses and Build
        run: |
          # Создаем пустой файл лицензий, чтобы sdkmanager не спрашивал ничего
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Автоматически принимаем все лицензии
          export ANDROID_HOME=/usr/local/lib/android/sdk
          yes | sdkmanager --licenses || true
          
          # Очистка и запуск
          rm -rf .buildozer
          buildozer android debug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
