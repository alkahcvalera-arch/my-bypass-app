name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython

      - name: Setup Android SDK/NDK
        run: |
          # Создаем структуру .buildozer вручную, чтобы он ничего не качал
          mkdir -p .buildozer/android/platform/android-sdk
          mkdir -p .buildozer/android/platform/android-ndk-r28c
          
          # Копируем системные инструменты в папку билдозера
          cp -r /usr/local/lib/android/sdk/platforms .buildozer/android/platform/android-sdk/
          cp -r /usr/local/lib/android/sdk/build-tools .buildozer/android/platform/android-sdk/
          cp -r /usr/local/lib/android/sdk/platform-tools .buildozer/android/platform/android-sdk/
          
          # Указываем buildozer использовать ЭТУ папку
          echo "export ANDROID_HOME=$PWD/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/28.0.13004108" >> $GITHUB_ENV

      - name: Build
        run: buildozer android debug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
