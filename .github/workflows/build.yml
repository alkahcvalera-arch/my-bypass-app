name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython

      - name: Build
        run: |
          # Указываем Buildozer'у использовать NDK, который уже есть на сервере
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
          export ANDROID_SDK_HOME=/usr/local/lib/android/sdk
          
          # Очистка и запуск
          rm -rf .buildozer
          buildozer android debug
