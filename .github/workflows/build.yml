name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython

      - name: Fix SDK Paths and Build
        run: |
          # Создаем структуру папок
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk
          
          # Скачиваем и распаковываем актуальные cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/tools.zip
          unzip -q /tmp/tools.zip -d /tmp/cmdline-tools
          
          # Перемещаем в нужное место
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mv /tmp/cmdline-tools/cmdline-tools/* /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          
          # СОЗДАЕМ ССЫЛКУ, чтобы buildozer нашел sdkmanager
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
          ln -s /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # Принимаем лицензии
          export PATH=$PATH:/home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          
          # Запуск сборки
          buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
